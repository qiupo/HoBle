                - text: ）
          - generic [ref=e381]:
            - heading "Basic Services Kit" [level=3] [ref=e382]
            - list [ref=e383]:
              - listitem [ref=e384]:
                - text: 新增用于消除API产生的告警的API注解能力。在源码用此注解后，编译时会根据配置的规则来抑制对应警告。（
