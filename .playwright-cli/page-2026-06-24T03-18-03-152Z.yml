            - heading "ArkUI" [level=3] [ref=e360]
            - list [ref=e361]:
              - listitem [ref=e362]:
                - text: 新增支持设置自定义键盘在输入框之间切换时是否接续（即不收回）。（
                - link "API参考" [ref=e363] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/arkts-apis-uicontext-uicontext#setcustomkeyboardcontinuefeature23
                - text: ）
              - listitem [ref=e364]:
                - text: 跑马灯ArkTS API的初始化参数新增两轮跑马灯之间的间距“spacing”和每次滚动的时间间隔“delay”。（
                - link "API参考" [ref=e365] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/ts-basic-components-marquee#marqueeoptions18对象说明
                - text: ）
              - listitem [ref=e366]:
                - text: 跑马灯C API新增
                - link "设置" [ref=e367] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_setspacing
                - text: 和
                - link "获取" [ref=e368] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_getspacing
                - text: 间距、
                - link "设置" [ref=e369] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_setloop
                - text: 和
                - link "获取" [ref=e370] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_getloop
                - text: 重复滚动次数、
                - link "设置" [ref=e371] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_setfromstart
                - text: 和
                - link "获取" [ref=e372] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_getfromstart
                - text: 运行方向、
                - link "设置" [ref=e373] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_setdelay
                - text: 和
                - link "获取" [ref=e374] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/capi-native-type-h#oh_arkui_textmarqueeoptions_getdelay
                - text: 滚动时间间隔的能力。
              - listitem [ref=e375]:
                - text: 组件布局位置设置新增定义在相对容器中子组件在
                - link "水平方向" [ref=e376] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/ts-universal-attributes-location#horizontalalignparam23对象说明
                - text: 和
                - link "垂直方向" [ref=e377] [cursor=pointer]:
                  - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-references/ts-universal-attributes-location#verticalalignparam23对象说明
                - text: 上的对齐规则。
              - listitem [ref=e378]:
                - text: 滚动组件新增模拟拖拽功能，支持开启/关闭模拟拖拽功能、设置模拟拖拽距离以及获取是否处于模拟拖拽状态的能力。（
                - link "ArkTS API参考" [ref=e379] [cursor=pointer]:
