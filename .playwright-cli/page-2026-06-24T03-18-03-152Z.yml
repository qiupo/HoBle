              - text: 游戏渲染加速服务新增支持TV设备（
              - link "指南" [ref=e395] [cursor=pointer]:
                - /url: https://developer.huawei.com/consumer/cn/doc/harmonyos-guides/graphics-accelerate-introduction#支持的设备
              - text: ）。
          - generic [ref=e396]:
            - heading "Share Kit" [level=3] [ref=e397]
            - paragraph [ref=e398]:
              - text: 新增支持阅读分享功能，即选中文本进行分享时，分享面板同时显示图片分享和文本分享，用户可选择图片或文本进行分享。（
              - link "API参考" [ref=e399] [cursor=pointer]:
